name: Release Frontend

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build Single HTML File
        run: |
          cd frontend
          npm run build:single

      - name: Rename output
        run: mv frontend/dist-single/index.html lns-viewer-${{ github.event.release.tag_name }}.html

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: lns-viewer-${{ github.event.release.tag_name }}.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
